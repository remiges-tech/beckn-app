[database]
host     =  {{env "DB_HOST"}}
port     =  {{env "DB_PORT"}}
database =  {{env "DB_NAME"}}
user     =  {{env "DB_USER"}}
password =  {{env "DB_PASSWORD"}}
sslmode  =  {{env "DB_SSLMODE"}}

[tern]
migrations-dir      = migrations
version-table-schema = public
version-table        = schema_migrations
