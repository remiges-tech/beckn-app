server {
    listen 80;

    # Serve the React SPA — all unknown paths fall back to index.html
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* calls to the BAP application.
    # "bap" is the Docker Compose service name; resolved via the internal beckn network.
    location /api/ {
        proxy_pass         http://bap:8083;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
