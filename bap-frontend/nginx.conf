server {
    listen 80;

    # Re-resolve the upstream hostname on every request instead of caching it at
    # startup. NGINX_RESOLVER is "127.0.0.11 8.8.8.8 8.8.4.4" for local Docker
    # Compose (127.0.0.11 is Docker's embedded DNS, resolves compose service
    # names) and just "8.8.8.8 8.8.4.4" on Cloud Run — 127.0.0.11 has nothing
    # listening on it there.
    resolver ${NGINX_RESOLVER} valid=10s ipv6=off;

    # Serve the React SPA — all unknown paths fall back to index.html
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* calls to the BAP application. BAP_URL is the full base
    # URL (http://bap:8083 locally, the Cloud Run HTTPS URL in prod).
    location /api/ {
        set $upstream "${BAP_URL}";
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        # Host must match the proxy target, not the original request — Cloud Run
        # routes by Host header at its edge, so forwarding the frontend's own
        # host would make Google's edge unable to find the backend service.
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
