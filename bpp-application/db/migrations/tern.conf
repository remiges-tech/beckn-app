[database]
# Tern renders this file as a Go template (jackc/tern uses Masterminds/sprig's
# FuncMap), so {{env "..."}} is required for an env var to actually override
# the default — a literal value here is never read from the environment.
host     = {{env "PGHOST" | default "localhost"}}
port     = {{env "PGPORT" | default "5435"}}
database = {{env "PGDATABASE" | default "bpp"}}
user     = {{env "PGUSER" | default "postgres"}}
password = {{env "PGPASSWORD" | default "postgres"}}
sslmode  =  disable
[tern]
# Directory containing migration SQL files (relative to this config file)
migrations-dir = migrations

# Schema that holds the tern version tracking table
version-table-schema = public
version-table        = schema_migrations
