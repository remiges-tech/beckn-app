[database]
# Tern database connection configuration.
# Override via environment variables: PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
# or pass --conn-string on the CLI.
host     =localhost
port     =5432
database =bpp
user     =postgres
password =postgres
# sslmode options: disable | allow | prefer | require | verify-ca | verify-full
sslmode  =prefer

[tern]
# Directory containing migration SQL files (relative to this config file)
migrations-dir = migrations

# Schema that holds the tern version tracking table
version-table-schema = public
version-table        = schema_migrations
