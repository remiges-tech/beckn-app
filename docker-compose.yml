name: beckn-app

# ─────────────────────────────────────────────────────────────────────────────
# Shared Beckn network: BPP ↔ BAP ↔ ONIX adapter ↔ Postgres
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── Postgres (shared, two databases: bpp / bap) ──────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres # default db (not used by services)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh:ro
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - beckn

  # ─── BPP Application ──────────────────────────────────────────────────────
  bpp:
    build:
      context: ./bpp-application
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PORT: "8080"
      APP_ENV: development

      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: bpp
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable

      LOG_LEVEL: info

      BPP_ID: bpptest1.remiges.tech
      BPP_URI: https://bpptest.remiges.tech/bpp/receiver
      NETWORK_ID: ion.id/ion-winroom-0426

      CDS_PUBLISH_URL: "https://fabric.nfh.global/beckn/catalog/publish" # BPP → CDS catalog publish endpoint
      BPP_SIGNING_PRIVATE_KEY: "" # base64 Ed25519 seed (required for signed outbound calls)
      BPP_SIGNING_KEY_ID: "key-001"
    ports:
      - "8080:8080"
    networks:
      - beckn

  # ─── BAP Application ──────────────────────────────────────────────────────
  bap:
    build:
      context: ./bap-application
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PORT: "8083"
      APP_ENV: development

      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: bap
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable

      LOG_LEVEL: info

      BAP_ID: baptest1.remiges.tech
      # BAP_URI goes in context.bapUri so the adapter/BPP knows where to send callbacks.
      BAP_URI: https://baptest.remiges.tech/bap/receiver
      NETWORK_ID: ion.id/ion-winroom-0426

      # BPP identity placed in context.bppId / context.bppUri.
      BPP_ID: bpptest1.remiges.tech
      BPP_URI: http://bpptest.remiges.tech/bpp/receiver

      # ADAPTER_URL is the ONIX BAP adapter the BAP actually POSTs to.
      ADAPTER_URL: https://baptest.remiges.tech/bap/caller

      CDS_DISCOVER_URL: "https://34.47.138.217.sslip.io/beckn/discover"
    ports:
      - "8083:8083"
    networks:
      - beckn

  # ─── BAP Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./bap-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - bap
    ports:
      - "3000:80"
    networks:
      - beckn

volumes:
  postgres_data:


networks:
  beckn:
    driver: bridge
