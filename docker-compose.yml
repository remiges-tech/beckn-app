name: beckn-app

# ─────────────────────────────────────────────────────────────────────────────
# Shared Beckn network: BPP ↔ BAP ↔ ONIX adapter ↔ Postgres
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── Postgres (shared, two databases: bpp / bap) ──────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres # default db (not used by services)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh:ro
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - beckn

  # ─── ONIX Adapter Infrastructure ──────────────────────────────────────────
  redis-bap:
    image: redis:alpine
    container_name: redis-bap
    networks:
      - beckn
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-bpp:
    image: redis:alpine
    container_name: redis-bpp
    networks:
      - beckn
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  onix-bap:
    image: fidedocker/onix-adapter:latest
    container_name: onix-bap
    platform: linux/amd64
    restart: unless-stopped
    networks:
      - beckn
    ports:
      - "8081:8081"
    environment:
      CONFIG_FILE: "/app/config/local-simple-bap.yaml"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      REDIS_ADDR: redis-bap:6379
      RABBITMQ_ADDR: rabbitmq:5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin123
    depends_on:
      redis-bap:
        condition: service_healthy
    volumes:
      - ./config:/app/config
      - ./schemas:/app/schemas
    command: [ "./server", "--config=/app/config/local-simple-bap.yaml" ]

  onix-bpp:
    image: fidedocker/onix-adapter:latest
    container_name: onix-bpp
    platform: linux/amd64
    restart: unless-stopped
    networks:
      - beckn
    ports:
      - "8082:8082"
    environment:
      CONFIG_FILE: "/app/config/local-simple-bpp.yaml"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      REDIS_ADDR: redis-bpp:6379
      RABBITMQ_ADDR: rabbitmq:5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin123
    depends_on:
      redis-bpp:
        condition: service_healthy
    volumes:
      - ./config:/app/config
      - ./schemas:/app/schemas
    command: [ "./server", "--config=/app/config/local-simple-bpp.yaml" ]

  # ─── BPP Application ──────────────────────────────────────────────────────
  bpp:
    build:
      context: ./bpp-application
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      onix-bpp:
        condition: service_started
    environment:
      APP_PORT: "8080"
      APP_ENV: development

      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: bpp
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable

      LOG_LEVEL: info

      # bpptest1.remiges.tech retired — onix-bpp-x7m2wmy7nq-et.a.run.app is the
      # only currently-registered identity for this side (matches remiges-trade).
      BPP_ID: onix-bpp-x7m2wmy7nq-et.a.run.app
      # Bare registered Subscriber URL, not the internal /bpp/receiver path —
      # goes straight into context.bppUri (matches remiges-trade).
      BPP_URI: http://onix-bpp:8082
      NETWORK_ID: ion.id/ion-launch

      # BppCallerURL is the ONIX BPP caller base URL used for outbound on_* callbacks.
      BPP_CALLER_URL: http://onix-bpp:8082/bpp/caller

      CDS_PUBLISH_URL: "https://fabric.nfh.global/beckn/catalog/publish" # BPP → CDS catalog publish endpoint

      # Ed25519 signing key registered for onix-bpp-x7m2wmy7nq-et.a.run.app —
      # signs outbound requests to CDS_PUBLISH_URL, and is the SAME keypair as
      # the onix keyManager below (one registered identity, one key). Mirrors
      # the keyManager config in config/local-simple-bpp.yaml. Sourced from
      # the git-ignored root .env file.
      BPP_PRIVATE_KEY: ${BPP_PRIVATE_KEY}
      BPP_KEY_ID: ${BPP_KEY_ID}
    ports:
      - "8080:8080"
    networks:
      - beckn

  # ─── BAP Application ──────────────────────────────────────────────────────
  bap:
    build:
      context: ./bap-application
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      onix-bap:
        condition: service_started
    environment:
      APP_PORT: "8083"
      APP_ENV: development

      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: bap
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable

      LOG_LEVEL: info

      # baptest1.remiges.tech retired — onix-bap-x7m2wmy7nq-et.a.run.app is the
      # only currently-registered identity for this side (matches remiges-trade).
      BAP_ID: onix-bap-x7m2wmy7nq-et.a.run.app
      # Bare registered Subscriber URL, not the internal /bap/receiver path —
      # goes straight into context.bapUri (matches remiges-trade).
      BAP_URI: http://onix-bap:8081
      NETWORK_ID: ion.id/ion-launch

      # BPP identity placed in context.bppId / context.bppUri.
      BPP_ID: onix-bpp-x7m2wmy7nq-et.a.run.app
      BPP_URI: http://onix-bpp:8082

      # ADAPTER_URL is the ONIX BAP adapter the BAP actually POSTs to.
      ADAPTER_URL: http://onix-bap:8081/bap/caller

      CDS_DISCOVER_URL: "https://34.47.138.217.sslip.io/beckn/discover"

      # Ed25519 signing key registered for onix-bap-x7m2wmy7nq-et.a.run.app —
      # signs outbound requests to CDS_DISCOVER_URL, and is the SAME keypair as
      # the onix keyManager below (one registered identity, one key). Mirrors
      # the keyManager config in config/local-simple-bap.yaml. Sourced from
      # the git-ignored root .env file.
      BAP_PRIVATE_KEY: ${BAP_PRIVATE_KEY}
      BAP_KEY_ID: ${BAP_KEY_ID}
    ports:
      - "8083:8083"
    networks:
      - beckn

  # ─── BAP Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./bap-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - bap
    environment:
      BAP_URL: http://bap:8083
      # 127.0.0.11 is Docker's embedded DNS, resolves compose service names.
      NGINX_RESOLVER: "127.0.0.11 8.8.8.8 8.8.4.4"
    ports:
      - "3000:80"
    networks:
      - beckn

  # ─── BPP Frontend (Admin Dashboard) ─────────────────────────────────────
  bpp-frontend:
    build:
      context: ./bpp-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - bpp
    environment:
      BPP_URL: http://bpp:8080
      NGINX_RESOLVER: "127.0.0.11 8.8.8.8 8.8.4.4"
    ports:
      - "3001:80"
    networks:
      - beckn

volumes:
  postgres_data:


networks:
  beckn:
    driver: bridge
